spring:
  datasource:
    url: ${DB}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      validation-timeout: 5000
      initialization-fail-timeout: 10000
      minimum-idle: 0
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect