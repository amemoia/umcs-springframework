$kind: http-request
name: 'Create Car (Remote DB)'
method: POST
url: '{{baseUrl}}/api/vehicles'
order: 620
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{adminToken}}
body:
  type: json
  content: |-
    {
      "category": "CAR",
      "brand": "Honda",
      "model": "Civic",
      "year": 2024,
      "price": 175.0,
      "attributes": {
        "plate": "REMOTE01",
        "fuelType": "Petrol",
        "numberOfSeats": 5
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has a non-empty id", function () {
          const id = pm.response.json().id;
          pm.expect(id).to.be.a('string');
          pm.expect(id.length).to.be.above(0);
      });

      pm.test("Category is 'CAR'", function () {
          pm.expect(pm.response.json().category).to.eql('CAR');
      });

      pm.test("Brand is 'Honda'", function () {
          pm.expect(pm.response.json().brand).to.eql('Honda');
      });

      pm.test("Model is 'Civic'", function () {
          pm.expect(pm.response.json().model).to.eql('Civic');
      });

      pm.test("New vehicle is not rented", function () {
          pm.expect(pm.response.json().rented).to.be.false;
      });

      pm.collectionVariables.set('remoteCreatedCarId', pm.response.json().id);

