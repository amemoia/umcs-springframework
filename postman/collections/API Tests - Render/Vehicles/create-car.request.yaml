$kind: http-request
name: 'Create Car (Toyota Corolla)'
method: POST
url: '{{baseUrl}}/api/vehicles'
order: 600
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{adminToken}}
body:
  type: json
  content: |-
    {
      "category": "CAR",
      "brand": "Toyota",
      "model": "Corolla",
      "year": 2023,
      "price": 150.0,
      "attributes": {
        "plate": "TEST01",
        "fuelType": "Petrol",
        "numberOfSeats": 5
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has a non-empty id", function () {
          const id = pm.response.json().id;
          pm.expect(id).to.be.a('string');
          pm.expect(id.length).to.be.above(0);
      });

      pm.test("Category is 'CAR'", function () {
          pm.expect(pm.response.json().category).to.eql('CAR');
      });

      pm.test("Brand is 'Toyota'", function () {
          pm.expect(pm.response.json().brand).to.eql('Toyota');
      });

      pm.test("Model is 'Corolla'", function () {
          pm.expect(pm.response.json().model).to.eql('Corolla');
      });

      pm.test("Year is 2023", function () {
          pm.expect(pm.response.json().year).to.eql(2023);
      });

      pm.test("Price is 150.0", function () {
          pm.expect(pm.response.json().price).to.be.closeTo(150.0, 0.001);
      });

      pm.test("New vehicle is not rented", function () {
          pm.expect(pm.response.json().rented).to.be.false;
      });

      // Store created ID for the delete cleanup request below
      pm.collectionVariables.set('createdCarId', pm.response.json().id);
