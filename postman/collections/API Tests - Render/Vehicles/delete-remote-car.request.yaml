$kind: http-request
name: 'Delete Car (Remote DB Cleanup)'
method: DELETE
url: '{{baseUrl}}/api/vehicles/:id'
order: 630
headers:
  - key: Authorization
    value: Bearer {{adminToken}}
pathVariables:
  - key: id
    value: '{{remoteCreatedCarId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 204 (No Content)", function () {
          pm.response.to.have.status(204);
      });

      pm.test("Response body is empty", function () {
          pm.expect(pm.response.text().length).to.eql(0);
      });

      pm.collectionVariables.set('remoteCreatedCarId', '');

