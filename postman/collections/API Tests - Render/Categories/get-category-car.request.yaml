$kind: http-request
name: 'Get Category - Car'
method: GET
url: '{{baseUrl}}/api/categories/:category'
order: 2000
headers:
  - key: Authorization
    value: Bearer {{userToken}}
pathVariables:
  - key: category
    value: Car
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a JSON object", function () {
          pm.expect(pm.response.json()).to.be.an('object');
      });

      pm.test("Category field is 'Car'", function () {
          pm.expect(pm.response.json().category).to.eql('Car');
      });

      pm.test("Has 'attributes' field", function () {
          pm.expect(pm.response.json()).to.have.property('attributes');
      });

      pm.test("Car attributes include 'fuelType'", function () {
          pm.expect(pm.response.json().attributes).to.have.property('fuelType');
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
