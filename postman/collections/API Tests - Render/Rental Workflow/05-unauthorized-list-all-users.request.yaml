$kind: http-request
name: '05 - Unauthorized List All Users'
method: GET
url: '{{baseUrl}}/api/users'
order: 840
headers:
  - key: Authorization
    value: Bearer {{userToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 401 or 403", function () {
          pm.expect([401, 403]).to.include(pm.response.code);
      });

      pm.test("User token must not be able to list users", function () {
          pm.expect(pm.response.code).to.not.eql(200);
      });

