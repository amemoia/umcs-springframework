$kind: http-request
name: List All Rentals
method: GET
url: '{{baseUrl}}/api/rentals'
order: 1000
headers:
  - key: Authorization
    value: Bearer {{adminToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a JSON array", function () {
          pm.expect(pm.response.json()).to.be.an('array');
      });

      pm.test("Seed rentals are present", function () {
          pm.expect(pm.response.json()).to.be.an('array');
      });

      pm.test("Each rental has required fields: id, vehicle, user, rentDateTime", function () {
          pm.response.json().forEach(function (r) {
              pm.expect(r).to.have.property('id');
              pm.expect(r).to.have.property('vehicle');
              pm.expect(r).to.have.property('user');
              pm.expect(r).to.have.property('rentDateTime');
          });
      });

      pm.test("Each rental's vehicle has an id", function () {
          pm.response.json().forEach(function (r) {
              pm.expect(r.vehicle).to.have.property('id');
          });
      });

      pm.test("Each rental's user has an id", function () {
          pm.response.json().forEach(function (r) {
              pm.expect(r.user).to.have.property('id');
          });
      });

      pm.test("rentDateTime is a non-empty string", function () {
          pm.response.json().forEach(function (r) {
              pm.expect(r.rentDateTime).to.be.a('string');
              pm.expect(r.rentDateTime.length).to.be.above(0);
          });
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
