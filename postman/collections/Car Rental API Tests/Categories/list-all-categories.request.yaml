$kind: http-request
name: List All Categories
method: GET
url: '{{baseUrl}}/api/categories'
order: 1000
headers:
  - key: Authorization
    value: Bearer {{userToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a JSON array", function () {
          pm.expect(pm.response.json()).to.be.an('array');
      });

      pm.test("Array is non-empty", function () {
          pm.expect(pm.response.json().length).to.be.greaterThan(0);
      });

      pm.test("Each category has 'category' and 'attributes' fields", function () {
          pm.response.json().forEach(function (cat) {
              pm.expect(cat).to.have.property('category');
              pm.expect(cat).to.have.property('attributes');
          });
      });

      pm.test("All three known categories are present (Car, Motorcycle, Bus)", function () {
          const names = pm.response.json().map(function (c) { return c.category; });
          pm.expect(names).to.include.members(['Car', 'Motorcycle', 'Bus']);
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
