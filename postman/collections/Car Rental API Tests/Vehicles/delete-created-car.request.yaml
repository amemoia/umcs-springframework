$kind: http-request
name: 'Delete Created Car (Cleanup)'
method: DELETE
url: '{{baseUrl}}/api/vehicles/:id'
order: 6000
headers:
  - key: Authorization
    value: Bearer {{adminToken}}
pathVariables:
  - key: id
    value: '{{createdCarId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 204 (No Content)", function () {
          pm.response.to.have.status(204);
      });

      pm.test("Response body is empty", function () {
          pm.expect(pm.response.text().length).to.eql(0);
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // Clear the variable after cleanup
      pm.collectionVariables.set('createdCarId', '');
