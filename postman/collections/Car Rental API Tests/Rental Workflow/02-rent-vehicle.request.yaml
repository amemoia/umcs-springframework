$kind: http-request
name: '02 - Rent the Vehicle'
method: POST
url: '{{baseUrl}}/api/rentals/rent'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{userToken}}
body:
  type: json
  content: |-
    {
      "vehicleId": "{{workflowVehicleId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      console.log("RESPONSE BODY:", pm.response.text());
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a rental object", function () {
          pm.expect(pm.response.json()).to.be.an('object');
      });

      pm.test("Rental has an id", function () {
          pm.expect(pm.response.json()).to.have.property('id');
          pm.expect(pm.response.json().id.length).to.be.above(0);
      });

      pm.test("Rental is linked to the correct vehicle", function () {
          pm.expect(pm.response.json().vehicle.id).to.eql(pm.collectionVariables.get('workflowVehicleId'));
      });

      pm.test("Rental is linked to the correct user", function () {
          pm.expect(pm.response.json().user.id).to.eql(pm.collectionVariables.get('regularUserId'));
      });

      pm.test("rentDateTime is set", function () {
          const dt = pm.response.json().rentDateTime;
          pm.expect(dt).to.be.a('string');
          pm.expect(dt.length).to.be.above(0);
      });

      pm.test("returnDateTime is null (active rental)", function () {
          pm.expect(pm.response.json().returnDateTime).to.be.null;
      });

      pm.test("Vehicle is now marked as rented", function () {
          pm.expect(pm.response.json().vehicle.rented).to.be.true;
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
