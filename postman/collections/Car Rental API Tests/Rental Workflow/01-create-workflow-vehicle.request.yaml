$kind: http-request
name: '01 - Create Workflow Vehicle'
method: POST
url: '{{baseUrl}}/api/vehicles'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{adminToken}}
body:
  type: json
  content: |-
    {
      "category": "CAR",
      "brand": "Ford",
      "model": "Focus",
      "year": 2022,
      "price": 120.0,
      "attributes": {
        "plate": "WORKFLOW",
        "fuelType": "Diesel"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has a non-empty id", function () {
          const id = pm.response.json().id;
          pm.expect(id).to.be.a('string');
          pm.expect(id.length).to.be.above(0);
      });

      // Store created ID for the workflow
      pm.collectionVariables.set('workflowVehicleId', pm.response.json().id);
