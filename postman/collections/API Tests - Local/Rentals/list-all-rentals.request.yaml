$kind: http-request
name: List All Orders
method: GET
url: '{{baseUrl}}/api/orders'
order: 700
headers:
  - key: Authorization
    value: Bearer {{adminToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a JSON array", function () {
          pm.expect(pm.response.json()).to.be.an('array');
      });

      pm.test("Seed orders are present or list is empty in clean DB", function () {
          pm.expect(pm.response.json()).to.be.an('array');
      });

      pm.test("Each order has required fields", function () {
          pm.response.json().forEach(function (order) {
              pm.expect(order).to.have.property('id');
              pm.expect(order).to.have.property('items');
              pm.expect(order).to.have.property('status');
              pm.expect(order).to.have.property('paymentStatus');
          });
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
