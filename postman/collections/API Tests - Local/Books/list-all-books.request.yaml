$kind: http-request
name: List All Books
method: GET
url: '{{baseUrl}}/api/books'
order: 500
headers:
  - key: Authorization
    value: Bearer {{userToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a JSON array", function () {
          pm.expect(pm.response.json()).to.be.an('array');
      });

      pm.test("Array is non-empty (seed data exists)", function () {
          pm.expect(pm.response.json().length).to.be.greaterThan(0);
      });

      pm.test("Each book has required fields", function () {
          pm.response.json().forEach(function (book) {
              pm.expect(book).to.have.property('id');
              pm.expect(book).to.have.property('title');
              pm.expect(book).to.have.property('author');
              pm.expect(book).to.have.property('isbn');
              pm.expect(book).to.have.property('price');
              pm.expect(book).to.have.property('stock');
          });
      });

      pm.test("Book prices are positive numbers", function () {
          pm.response.json().forEach(function (book) {
              pm.expect(book.price).to.be.a('number');
              pm.expect(book.price).to.be.above(0);
          });
      });

      pm.test("Book stock values are non-negative", function () {
          pm.response.json().forEach(function (book) {
              pm.expect(book.stock).to.be.at.least(0);
          });
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

