$kind: http-request
name: 'Update Order Status'
method: PATCH
url: '{{baseUrl}}/api/orders/:id/status'
order: 721
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{adminToken}}
pathVariables:
  - key: id
    value: '{{orderId}}'
body:
  type: json
  content: |-
    {
      "status": "SHIPPED"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Order status is updated", function () {
          pm.expect(pm.response.json().status).to.eql('SHIPPED');
      });
