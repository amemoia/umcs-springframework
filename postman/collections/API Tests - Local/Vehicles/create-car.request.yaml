$kind: http-request
name: 'Create Book (Clean Architecture)'
method: POST
url: '{{baseUrl}}/api/books'
order: 600
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{adminToken}}
body:
  type: json
  content: |-
    {
      "title": "Clean Architecture",
      "author": "Robert C. Martin",
      "isbn": "9780134494166",
      "price": 159.99,
      "stock": 7,
      "description": "Test book created by admin"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has a non-empty id", function () {
          const id = pm.response.json().id;
          pm.expect(id).to.be.a('string');
          pm.expect(id.length).to.be.above(0);
      });

      pm.test("Book fields match payload", function () {
          const response = pm.response.json();
          pm.expect(response.title).to.eql('Clean Architecture');
          pm.expect(response.author).to.eql('Robert C. Martin');
          pm.expect(response.stock).to.eql(7);
      });

      pm.collectionVariables.set('createdBookId', pm.response.json().id);
