$kind: http-request
name: 'Get Book By Id'
method: GET
url: '{{baseUrl}}/api/books/:id'
order: 310
headers:
pathVariables:
  - key: id
    value: '{{knownBookId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a JSON object", function () {
          pm.expect(pm.response.json()).to.be.an('object');
      });

      pm.test("Returned ID matches requested knownBookId", function () {
          pm.expect(pm.response.json().id).to.eql(pm.collectionVariables.get('knownBookId'));
      });

      pm.test("Book response exposes title and author", function () {
          pm.expect(pm.response.json()).to.have.property('title');
          pm.expect(pm.response.json()).to.have.property('author');
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
