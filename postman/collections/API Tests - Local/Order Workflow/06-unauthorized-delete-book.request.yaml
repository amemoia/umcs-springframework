$kind: http-request
name: '06 - Unauthorized Delete Book'
method: DELETE
url: '{{baseUrl}}/api/books/{{createdBookId}}'
order: 850
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 401 or 403", function () {
          pm.expect([401, 403]).to.include(pm.response.code);
      });

