$kind: http-request
name: '01 - Create Payment Session'
method: POST
url: '{{baseUrl}}/api/payments/{{orderId}}'
order: 4510
headers:
  - key: Authorization
    value: Bearer {{userToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a payment session", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property('sessionId');
          pm.expect(response).to.have.property('orderId');
          pm.expect(response).to.have.property('checkoutUrl');
          pm.expect(response).to.have.property('paymentStatus');
      });

      pm.test("Session belongs to the current order", function () {
          const response = pm.response.json();
          pm.expect(response.orderId).to.eql(pm.collectionVariables.get('orderId'));
          pm.expect(response.sessionId).to.match(/^cs_/);
          pm.expect(response.paymentStatus).to.eql('PENDING');
      });

      pm.collectionVariables.set('paymentSessionId', pm.response.json().sessionId);
      pm.collectionVariables.set('paymentCheckoutUrl', pm.response.json().checkoutUrl);
      pm.collectionVariables.set('paymentSessionStatus', pm.response.json().paymentStatus);
