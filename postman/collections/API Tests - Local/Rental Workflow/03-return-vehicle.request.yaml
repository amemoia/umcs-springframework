$kind: http-request
name: '03 - Return the Vehicle'
method: POST
url: '{{baseUrl}}/api/rentals/return'
order: 820
headers:
  - key: Authorization
    value: Bearer {{userToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a rental object", function () {
          pm.expect(pm.response.json()).to.be.an('object');
      });

      pm.test("Return date time is set", function () {
          pm.expect(pm.response.json().returnDateTime).to.be.a('string');
      });

      pm.test("Vehicle is no longer rented", function () {
          pm.expect(pm.response.json().vehicle.rented).to.be.false;
      });
