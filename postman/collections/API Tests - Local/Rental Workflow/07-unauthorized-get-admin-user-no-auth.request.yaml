$kind: http-request
name: '07 - Unauthorized Get Admin User (No Auth)'
method: GET
url: '{{baseUrl}}/api/users/:id'
order: 860
pathVariables:
  - key: id
    value: '{{adminUserId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 401 or 403", function () {
          pm.expect([401, 403]).to.include(pm.response.code);
      });

      pm.test("No auth must not be able to fetch admin user", function () {
          pm.expect(pm.response.code).to.not.eql(200);
      });

