$kind: http-request
name: '04 - Cleanup Delete Workflow Book'
method: DELETE
url: '{{baseUrl}}/api/books/:id'
order: 830
headers:
  - key: Authorization
    value: Bearer {{adminToken}}
pathVariables:
  - key: id
    value: '{{workflowBookId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 204 (No Content)", function () {
          pm.response.to.have.status(204);
      });

      pm.test("Response body is empty", function () {
          pm.expect(pm.response.text().length).to.eql(0);
      });

      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      pm.collectionVariables.set('workflowBookId', '');
