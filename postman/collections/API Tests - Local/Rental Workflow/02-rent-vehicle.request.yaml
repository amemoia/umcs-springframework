$kind: http-request
name: '02 - Add Book To Cart'
method: POST
url: '{{baseUrl}}/api/cart'
order: 810
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{userToken}}
body:
  type: json
  content: |-
    {
      "bookId": "{{workflowBookId}}",
      "quantity": 2
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Cart item contains the workflow book", function () {
          const response = pm.response.json();
          pm.expect(response).to.have.property('id');
          pm.expect(response.quantity).to.eql(2);
          pm.expect(response.book.id).to.eql(pm.collectionVariables.get('workflowBookId'));
      });

      pm.collectionVariables.set('cartItemId', pm.response.json().id);
